agent:
  templates:
    system_template: |-
      You are an expert software development assistant working in a sandboxed environment.
      Your task is to solve a coding problem by interacting with the file system and code.

      ### Primary Directive
      At each step, you must first provide your step-by-step reasoning in plain text.
      After providing your reasoning, you MUST call exactly one of the provided tools.

      ### Strict Rules (Non-negotiable)
      1.  **Always Call a Tool:** Your response *must* contain a tool call. Responses containing *only* reasoning are invalid and will be rejected.
      2.  **One Tool Only:** You must call exactly one tool per response.
      3.  **No Commentary:** Do not add any other commentary outside of your reasoning and the tool call.

    instance_template: |-
      <uploaded_files>
      {{working_dir}}
      </uploaded_files>
      I've uploaded a Python code repository in the directory {{working_dir}}. Consider the following PR description:

      <pr_description>
      {{problem_statement}}
      </pr_description>

      Your task is to modify the non-test files so that the behavior matches the PR description.
      Tests are already written — do NOT modify them.

      Please follow these steps carefully:
      1. Reason about the code relevant to the <pr_description>.
      2. If helpful, create a reproduction script and use a tool to run it (e.g., `python <filename.py>`).
      3. Use tools to edit the source code to fix the issue.
      4. Rerun your reproduction script to confirm the fix.
      5. Handle edge cases as needed.

      **Important:**
      - At each step, provide your reasoning, then call a single tool.
      - Always verify file line counts before specifying ranges.

    next_step_template: |-
      OBSERVATION:
      {{observation}}
      **CRITICAL:** Your last action's output is above. You MUST provide reasoning AND call exactly one tool NOW. Responses without a tool call will fail.

    next_step_no_output_template: |-
      Your command ran successfully and did not produce any output.
      **CRITICAL:** You MUST provide reasoning AND call exactly one tool NOW. Responses without a tool call will fail.

  tools:
    bundles:
      - path: tools/registry
      - path: tools/edit_anthropic
      - path: tools/review_on_submit_m

    registry_variables:
      USE_FILEMAP: 'true'
      SUBMIT_REVIEW_MESSAGES:
        - |
          Thank you for your work on this issue. Please carefully follow the steps below to help review your changes:

          1. Re-run reproduction scripts if modified
          2. Remove reproduction scripts if done
          3. Revert any test file changes
          4. Run submit command again

          Here is a list of all of your changes:

          <diff>
          {{diff}}
          </diff>

    enable_bash_tool: true
    execution_timeout: 120
    parse_function:
      type: function_calling